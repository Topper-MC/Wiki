version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      prod-minor-patch:
        dependency-type: "production"
        exclude-patterns:
          - "@docusaurus/*"
        update-types:
          - "minor"
          - "patch"